<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The Louisiana Dog Report — Powered by Fi</title>
  <meta name="description" content="12 months of Fi collar data from Louisiana dogs. Most popular breeds, most active breeds, escape artists, and how the heat reshapes dog activity." />
  <meta property="og:title" content="The Louisiana Dog Report — Powered by Fi" />
  <meta property="og:description" content="12 months of Fi collar data from Louisiana dogs. Most popular breeds, escape artists, and the summer heat effect." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #000; overflow-x: hidden; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const FI = "#FFFF00";
    const GOLD = "#F1C40F";
    const GREEN = "#2ECC71";
    const RED = "#EF4444";
    const BLUE = "#3B82F6";
    const TEAL = "#14B8A6";
    const ORANGE = "#F97316";

    // ── DATA ────────────────────────────────────────────────────────────
    const POPULAR = [
      { rank: 1, name: "Labrador Retriever", count: 159 },
      { rank: 2, name: "Goldendoodle", count: 61 },
      { rank: 3, name: "Golden Retriever", count: 56 },
      { rank: 4, name: "German Shepherd Dog", count: 53 },
      { rank: 5, name: "American Pit Bull Terrier", count: 51 },
      { rank: 6, name: "Siberian Husky", count: 43 },
      { rank: 7, name: "Beagle", count: 39 },
      { rank: 8, name: "Catahoula Leopard Dog", count: 34, tag: "Louisiana native" },
      { rank: 9, name: "Chihuahua", count: 34 },
      { rank: 10, name: "Australian Shepherd", count: 31 },
      { rank: 11, name: "Australian Cattle Dog", count: 28 },
      { rank: 12, name: "German Shorthaired Pointer", count: 27, tag: "Most active" },
      { rank: 13, name: "Dachshund", count: 21 },
      { rank: 14, name: "Boxer", count: 21 },
      { rank: 15, name: "Border Collie", count: 20 },
      { rank: 16, name: "Poodle", count: 20 },
      { rank: 17, name: "Great Pyrenees", count: 19 },
      { rank: 18, name: "Miniature Schnauzer", count: 18 },
      { rank: 19, name: "Black Mouth Cur", count: 17 },
      { rank: 20, name: "French Bulldog", count: 15 },
    ];

    const ACTIVE = [
      { rank: 1, name: "German Shorthaired Pointer", steps: 22089 },
      { rank: 2, name: "Miniature Schnauzer", steps: 17731 },
      { rank: 3, name: "Border Collie", steps: 16035 },
      { rank: 4, name: "Dachshund", steps: 14907 },
      { rank: 5, name: "Boxer", steps: 14283 },
      { rank: 6, name: "Australian Shepherd", steps: 13201 },
      { rank: 7, name: "Goldendoodle", steps: 13182 },
      { rank: 8, name: "Poodle", steps: 13321 },
      { rank: 9, name: "German Shepherd Dog", steps: 12933 },
      { rank: 10, name: "Beagle", steps: 12662 },
    ];

    const ESCAPE = [
      { rank: 1, name: "Miniature Australian Shepherd", rate: 54.6 },
      { rank: 2, name: "Brittany", rate: 28.5 },
      { rank: 3, name: "Boxer", rate: 20.3 },
      { rank: 4, name: "Pembroke Welsh Corgi", rate: 18.1 },
      { rank: 5, name: "Black Mouth Cur", rate: 15.0 },
      { rank: 6, name: "Poodle", rate: 14.9 },
      { rank: 7, name: "Miniature Schnauzer", rate: 14.8 },
      { rank: 8, name: "Great Pyrenees", rate: 12.5 },
      { rank: 9, name: "Dachshund", rate: 12.4 },
      { rank: 10, name: "Labrador Retriever", rate: 11.7 },
    ];

    const MONTHS = [
      { month: "Mar", la: 12863, nat: 12515 },
      { month: "Apr", la: 12475, nat: 12523 },
      { month: "May", la: 12028, nat: 12314 },
      { month: "Jun", la: 11334, nat: 11825 },
      { month: "Jul", la: 11329, nat: 11445, highlight: true },
      { month: "Aug", la: 11785, nat: 11862 },
      { month: "Sep", la: 11997, nat: 12010 },
      { month: "Oct", la: 12520, nat: 12410 },
      { month: "Dec", la: 12699, nat: 12145 },
      { month: "Jan", la: 12443, nat: 11835 },
      { month: "Feb", la: 12424, nat: 11714 },
    ];

    const INSIGHTS = [
      { stat: "-7%", text: "Steps lost in the July heat vs. spring peak. Louisiana dogs feel the summer.", color: RED },
      { stat: "+6%", text: "Above the national median for 10 out of 11 months tracked.", color: GREEN },
      { stat: "July", text: "The only month Louisiana dogs dip below the national average. Heat wins.", color: ORANGE },
      { stat: "Fri", text: "Most active day of the week for Louisiana Fi dogs.", color: GOLD },
    ];

    // ── HELPERS ──────────────────────────────────────────────────────────
    function fmtNum(n) { return Math.abs(n).toLocaleString(); }

    function AnimNum({ value, suffix = "", prefix = "" }) {
      const [d, setD] = useState(0);
      useEffect(() => {
        const t0 = Date.now();
        const tick = () => {
          const p = Math.min((Date.now() - t0) / 900, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setD(value >= 1 ? Math.round(eased * value) : +(eased * value).toFixed(1));
          if (p < 1) requestAnimationFrame(tick);
        };
        tick();
      }, [value]);
      return <>{prefix}{typeof value === "number" && value >= 1 ? d.toLocaleString() : d}{suffix}</>;
    }

    // ── SECTION WRAPPER ─────────────────────────────────────────────────
    function Section({ children, delay = 0 }) {
      const ref = useRef(null);
      const [vis, setVis] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.15 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <div ref={ref} style={{
          opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(24px)",
          transition: `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`,
          marginBottom: 20,
        }}>
          {children}
        </div>
      );
    }

    // ── HORIZONTAL BAR ──────────────────────────────────────────────────
    function HBar({ value, max, color, label }) {
      const pct = (value / max) * 100;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ flex: 1, height: 6, background: "rgba(255,255,255,0.04)", borderRadius: 3, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.8s ease" }} />
          </div>
          <span style={{ fontSize: 10, fontWeight: 700, color, fontFamily: "'Space Mono',monospace", minWidth: 42, textAlign: "right" }}>{label}</span>
        </div>
      );
    }

    // ── SEASONAL CHART ──────────────────────────────────────────────────
    function SeasonalChart() {
      const allVals = MONTHS.flatMap(m => [m.la, m.nat]);
      const min = Math.min(...allVals) * 0.97;
      const max = Math.max(...allVals) * 1.02;
      const w = 300, h = 80, padX = 8, padY = 8;

      const getY = (v) => padY + (h - padY * 2) - ((v - min) / (max - min)) * (h - padY * 2);
      const getX = (i) => padX + (i / (MONTHS.length - 1)) * (w - padX * 2);

      const laPath = MONTHS.map((m, i) => `${i === 0 ? "M" : "L"}${getX(i)},${getY(m.la)}`).join(" ");
      const natPath = MONTHS.map((m, i) => `${i === 0 ? "M" : "L"}${getX(i)},${getY(m.nat)}`).join(" ");
      const julyIdx = 4;

      return (
        <svg viewBox={`0 0 ${w} ${h + 16}`} style={{ width: "100%", height: "auto", display: "block" }}>
          <defs>
            <linearGradient id="laGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={GOLD} stopOpacity="0.12" />
              <stop offset="100%" stopColor={GOLD} stopOpacity="0.01" />
            </linearGradient>
          </defs>
          {/* Area fill under LA line */}
          <path d={`${laPath} L${getX(MONTHS.length - 1)},${h - padY} L${getX(0)},${h - padY} Z`} fill="url(#laGrad)" />
          {/* National line */}
          <path d={natPath} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" strokeDasharray="3,3" strokeLinecap="round" />
          {/* LA line */}
          <path d={laPath} fill="none" stroke={GOLD} strokeWidth="2" strokeOpacity="0.7" strokeLinecap="round" strokeLinejoin="round" />
          {/* July highlight */}
          <circle cx={getX(julyIdx)} cy={getY(MONTHS[julyIdx].la)} r="4" fill={RED} stroke="#000" strokeWidth="1" />
          <circle cx={getX(0)} cy={getY(MONTHS[0].la)} r="2.5" fill={GREEN} />
          <circle cx={getX(MONTHS.length - 1)} cy={getY(MONTHS[MONTHS.length - 1].la)} r="2.5" fill={GOLD} />
          {/* Month labels */}
          {MONTHS.map((m, i) => (
            <text key={i} x={getX(i)} y={h + 10} fill={m.highlight ? RED : "rgba(255,255,255,0.25)"} fontSize="6" fontFamily="'Space Mono',monospace" textAnchor="middle" fontWeight={m.highlight ? "700" : "400"}>{m.month}</text>
          ))}
        </svg>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────
    function App() {
      const [shared, setShared] = useState(false);

      const handleShare = async () => {
        const text = `The Louisiana Dog Report (Fi x Dog House NOLA 2026)\n\n#1 breed: Labrador Retriever (159 dogs)\nMost active: German Shorthaired Pointer (22,089 steps/day)\nBiggest escape artist: Mini Aussie (54.6 activations/dog)\nJuly heat drops activity 7% vs spring peak\nLouisiana dogs beat the national average 10 of 11 months\n\nPowered by @tryfi collars`;
        if (navigator.share) {
          try { await navigator.share({ title: "The Louisiana Dog Report", text }); setShared(true); } catch (e) {}
        } else {
          try { await navigator.clipboard.writeText(text); setShared(true); setTimeout(() => setShared(false), 2500); } catch (e) {}
        }
      };

      const maxPop = POPULAR[0].count;
      const maxSteps = ACTIVE[0].steps;
      const maxEscape = ESCAPE[0].rate;

      return (
        <div style={{ minHeight: "100vh", background: "#000", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "20px 16px", fontFamily: "'Barlow Condensed','Helvetica Neue',sans-serif" }}>
          <div style={{ width: "100%", maxWidth: 390, overflow: "visible" }}>
            <div style={{ padding: "0 2px" }}>

              {/* ── HERO ── */}
              <Section>
                <div style={{ textAlign: "center", marginBottom: 20, paddingTop: 12 }}>
                  <img src="fi-logo.png" alt="Fi" style={{ height: 20, marginBottom: 10, filter: "invert(92%) sepia(100%) saturate(10000%) hue-rotate(0deg)" }} />
                  <div style={{ display: "inline-block", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, padding: "4px 12px", fontSize: 9, fontWeight: 600, color: GOLD, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 12 }}>
                    Fi x Dog House NOLA 2026
                  </div>
                  <h1 style={{ fontSize: 28, fontWeight: 700, color: "#FFF", margin: "0 0 6px", lineHeight: 1.1, letterSpacing: "-0.02em" }}>
                    The <span style={{ color: GOLD }}>Louisiana</span><br />Dog Report
                  </h1>
                  <p style={{ fontSize: 11, color: "rgba(255,255,255,0.45)", margin: "0 0 18px", lineHeight: 1.5, padding: "0 10px" }}>
                    Fi collars track every step, every nap, every slow July afternoon. Here's what Louisiana dogs have been telling us about their breeds, their seasons, and what it really means to be a dog in the Pelican State.
                  </p>

                  {/* Hero stats */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                    {[
                      { value: "12 mo", label: "Of Activity Data" },
                      { value: "20+", label: "Breeds Analyzed" },
                      { value: "24/7", label: "Every Step Tracked" },
                    ].map(s => (
                      <div key={s.label} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "10px 6px" }}>
                        <div style={{ fontSize: 18, fontWeight: 700, color: GOLD, fontFamily: "'Space Mono',monospace", lineHeight: 1 }}>{s.value}</div>
                        <div style={{ fontSize: 8, color: "rgba(255,255,255,0.35)", marginTop: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </Section>

              {/* ── CHAPTER 01: MOST POPULAR ── */}
              <Section>
                <div style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 20, padding: "18px 18px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: GOLD, fontFamily: "'Space Mono',monospace" }}>01</span>
                    <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 2 }}>Most Popular Breeds</span>
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 }}>
                    Louisiana's top <span style={{ color: GOLD }}>20</span> breeds by Fi households
                  </div>
                  <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", margin: "0 0 14px", lineHeight: 1.5 }}>
                    From Creole parishes to lake country, these are the breeds showing up most in Louisiana Fi households ranked by how common they are.
                  </p>

                  {POPULAR.map((b, i) => (
                    <div key={b.name} style={{ marginBottom: i < POPULAR.length - 1 ? 6 : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 9, fontWeight: 700, color: i < 3 ? GOLD : "rgba(255,255,255,0.25)", fontFamily: "'Space Mono',monospace", minWidth: 16 }}>{b.rank}</span>

                        </div>

                      <HBar value={b.count} max={maxPop} color={i < 3 ? GOLD : i < 8 ? "rgba(241,196,15,0.5)" : "rgba(241,196,15,0.25)"} label="" />
                    </div>
                  ))}

              {/* ── CHAPTER 02: MOST ACTIVE ── */}

                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 }}>
                    Louisiana dogs don't <span style={{ color: GREEN }}>sit still</span>
                  </div>
                  <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", margin: "0 0 14px", lineHeight: 1.5 }}>
                    These are the breeds putting in the most miles, day after day. Ranked by median daily steps.
                  </p>

                  {/* Top dog callout */}
                  <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 14, padding: "14px 16px", marginBottom: 10, border: `1px solid ${GREEN}25` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF" }}>German Shorthaired Pointer</div>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>The undisputed step king of Louisiana</div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 22, fontWeight: 700, color: GREEN, fontFamily: "'Space Mono',monospace", lineHeight: 1 }}>
                          <AnimNum value={22089} />
                        </div>
                        <div style={{ fontSize: 8, color: "rgba(255,255,255,0.3)" }}>steps/day</div>
                      </div>
                    </div>
                  </div>

                  {ACTIVE.slice(1).map((b, i) => (
                    <div key={b.name} style={{ marginBottom: i < ACTIVE.length - 2 ? 6 : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 9, fontWeight: 700, color: "rgba(255,255,255,0.25)", fontFamily: "'Space Mono',monospace", minWidth: 16 }}>{b.rank}</span>
                          <span style={{ fontSize: 11, fontWeight: 500, color: "rgba(255,255,255,0.7)" }}>{b.name}</span>
                        </div>
                      </div>
                      <HBar value={b.steps} max={maxSteps} color={i < 2 ? GREEN : `${GREEN}80`} label={fmtNum(b.steps)} />
                    </div>
                  ))}

                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", margin: "12px 0 0", lineHeight: 1.4 }}>Median daily steps per breed across 12 months of Fi data.</p>
                </div>
              </Section>

              {/* ── CHAPTER 03: ESCAPE ARTISTS ── */}
              <Section>
                <div style={{ background: `linear-gradient(135deg, ${ORANGE}06, ${RED}04)`, border: `1px solid ${ORANGE}18`, borderRadius: 20, padding: "18px 18px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: ORANGE, fontFamily: "'Space Mono',monospace" }}>03</span>
                    <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 2 }}>Escape Artists</span>
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 }}>
                    Louisiana's <span style={{ color: ORANGE }}>Lost Dog Mode</span> leaders
                  </div>
                  <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", margin: "0 0 14px", lineHeight: 1.5 }}>
                    Which Louisiana breeds trigger Lost Dog Mode the most? Ranked by activations per dog across the state.
                  </p>

                  {/* Top escape artist callout */}
                  <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 14, padding: "14px 16px", marginBottom: 10, border: `1px solid ${ORANGE}25`, textAlign: "center" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 2 }}>Miniature Australian Shepherd</div>
                    <div style={{ fontSize: 36, fontWeight: 700, color: ORANGE, fontFamily: "'Space Mono',monospace", lineHeight: 1 }}>
                      <AnimNum value={54.6} suffix="x" />
                    </div>
                    <div style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>Lost Dog Mode activations per dog — nearly 2x the runner-up</div>
                  </div>

                  {ESCAPE.slice(1).map((b, i) => (
                    <div key={b.name} style={{ marginBottom: i < ESCAPE.length - 2 ? 6 : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 9, fontWeight: 700, color: "rgba(255,255,255,0.25)", fontFamily: "'Space Mono',monospace", minWidth: 16 }}>{b.rank}</span>
                          <span style={{ fontSize: 11, fontWeight: 500, color: "rgba(255,255,255,0.7)" }}>{b.name}</span>
                        </div>
                      </div>
                      <HBar value={b.rate} max={maxEscape} color={i < 2 ? ORANGE : `${ORANGE}70`} label={`${b.rate}`} />
                    </div>
                  ))}

                  <p style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", margin: "12px 0 0", lineHeight: 1.4 }}>Lost Dog Mode activations per dog. Higher = more adventurous (or more trouble).</p>
                </div>
              </Section>

              {/* ── CHAPTER 04: WEATHER EFFECT ── */}
              <Section>
                <div style={{ background: `linear-gradient(135deg, ${RED}05, ${GOLD}04)`, border: `1px solid ${GOLD}15`, borderRadius: 20, padding: "18px 18px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, color: RED, fontFamily: "'Space Mono',monospace" }}>04</span>
                    <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 2 }}>The Weather Effect</span>
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#FFF", marginBottom: 4 }}>
                    How <span style={{ color: RED }}>Louisiana heat</span> reshapes dog activity
                  </div>
                  <p style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", margin: "0 0 14px", lineHeight: 1.5 }}>
                    Louisiana summers are brutal. Fi data shows exactly how the heat reshapes dog activity and how Louisiana compares to every other state where Fi dogs roam.
                  </p>

                  {/* Chart */}
                  <div style={{ background: "rgba(0,0,0,0.2)", borderRadius: 12, padding: "12px 12px 6px" }}>
                    <div style={{ fontSize: 8, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Median Daily Steps — Mar 2025 to Feb 2026</div>
                    <SeasonalChart />
                    <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 6 }}>
                      <span style={{ fontSize: 8, color: GOLD, display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ width: 10, height: 2, borderRadius: 1, background: GOLD, display: "inline-block" }} /> Louisiana
                      </span>
                      <span style={{ fontSize: 8, color: "rgba(255,255,255,0.35)", display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ width: 10, height: 2, borderRadius: 1, background: "rgba(255,255,255,0.2)", display: "inline-block", borderTop: "1px dashed rgba(255,255,255,0.3)" }} /> National Avg
                      </span>
                    </div>
                    <p style={{ fontSize: 8, color: "rgba(255,255,255,0.2)", marginTop: 6, marginBottom: 4, lineHeight: 1.4 }}>
                      Nov 2025 excluded due to data pipeline issue. Red dot = July (heat slump).
                    </p>
                  </div>

                  {/* Insight cards */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 12 }}>
                    {INSIGHTS.map(ins => (
                      <div key={ins.stat} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 10, padding: "10px 10px" }}>
                        <div style={{ fontSize: 20, fontWeight: 700, color: ins.color, fontFamily: "'Space Mono',monospace", lineHeight: 1, marginBottom: 4 }}>{ins.stat}</div>
                        <div style={{ fontSize: 9, color: "rgba(255,255,255,0.45)", lineHeight: 1.4 }}>{ins.text}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </Section>

              {/* ── CTAs ── */}
              <Section>
                <a href="https://instagram.com/fi.dogs" target="_blank" rel="noopener noreferrer" style={{ width: "100%", background: FI, border: "none", borderRadius: 14, padding: "14px", color: "#000", fontSize: 13, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 8, boxSizing: "border-box" }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                  Follow @fi.dogs
                </a>
                <a href="https://tryfi.com/mini/dog?utm_campaign=mini&utm_medium=RT&utm_source=LADOGREPORT" target="_blank" rel="noopener noreferrer" style={{ width: "100%", background: FI, border: "none", borderRadius: 14, padding: "14px", color: "#000", fontSize: 13, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", textDecoration: "none", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 4, boxSizing: "border-box" }}>
                  Get a Fi Collar
                </a>
                <p style={{ textAlign: "center", fontSize: 11, color: "rgba(255,255,255,0.5)", margin: "0 0 10px" }}>
                  Use code <span style={{ color: FI, fontWeight: 700, letterSpacing: "0.05em" }}>NOLA40</span> for $40 off any Fi device
                </p>
                <button onClick={handleShare} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: "10px", color: "rgba(255,255,255,0.6)", fontSize: 11, fontWeight: 600, fontFamily: "inherit", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                  {shared ? "Copied!" : "Share Report"} {!shared && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>}
                </button>
              </Section>

              {/* Data note */}
              <div style={{ textAlign: "center", padding: "0 10px 20px" }}>
                <p style={{ fontSize: 8, color: "rgba(255,255,255,0.2)", margin: 0, lineHeight: 1.5 }}>
                  Data reflects Fi GPS collar activity from Louisiana dogs tracked March 2025 to February 2026. Breed activity uses median daily steps. Powered by Fi's network of 1M+ GPS smart collars.
                </p>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
